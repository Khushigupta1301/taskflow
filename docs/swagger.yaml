openapi: 3.0.0
info:
  title: TaskFlow API
  version: 1.0.0
  description: Scalable REST API with JWT Authentication & Role-Based Access Control
  contact:
    name: API Support
    email: support@taskflow.dev

servers:
  - url: http://localhost:5000/api/v1
    description: Development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [user, admin] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [todo, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string, format: date-time }
        tags: { type: array, items: { type: string } }
        owner: { $ref: '#/components/schemas/User' }
        isOverdue: { type: boolean }
        createdAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: "Jane Doe" }
                email: { type: string, example: "jane@example.com" }
                password: { type: string, example: "SecurePass1" }
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
        409:
          description: Email already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security: [{ BearerAuth: [] }]
      responses:
        200:
          description: Current user info
        401:
          description: Not authenticated

  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks (paginated, filterable)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [todo, in_progress, done] }
        - in: query
          name: priority
          schema: { type: string, enum: [low, medium, high] }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: sort
          schema: { type: string, default: -createdAt }
      responses:
        200:
          description: List of tasks with pagination

    post:
      tags: [Tasks]
      summary: Create a new task
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
                status: { type: string, enum: [todo, in_progress, done] }
                priority: { type: string, enum: [low, medium, high] }
                dueDate: { type: string, format: date-time }
                tags: { type: array, items: { type: string } }
      responses:
        201:
          description: Task created

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a specific task
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task found
        404:
          description: Task not found

    patch:
      tags: [Tasks]
      summary: Update a task
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string }
                priority: { type: string }
      responses:
        200:
          description: Task updated

    delete:
      tags: [Tasks]
      summary: Delete a task (soft delete)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        200:
          description: Task deleted

  /tasks/stats:
    get:
      tags: [Tasks]
      summary: Get task statistics (admin only)
      security: [{ BearerAuth: [] }]
      responses:
        200:
          description: Aggregated task stats
        403:
          description: Forbidden

  /users:
    get:
      tags: [Users]
      summary: Get all users (admin only)
      security: [{ BearerAuth: [] }]
      responses:
        200:
          description: List of all users

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Update user role (admin only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role: { type: string, enum: [user, admin] }
      responses:
        200:
          description: Role updated
